<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>3D Dice</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        flex-direction: column;
    }

    .dice {
        width: 150px;
        height: 150px;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(20deg) rotateY(20deg);
        transition: transform 1s ease;
    }

    .face {
        position: absolute;
        width: 150px;
        height: 150px;
        background: white;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        font-weight: bold;
        color: black;
    }

    /* Positionen der Würfelseiten */
    .front  { transform: rotateY(0deg) translateZ(75px); }
    .back   { transform: rotateY(180deg) translateZ(75px); }
    .right  { transform: rotateY(90deg) translateZ(75px); }
    .left   { transform: rotateY(-90deg) translateZ(75px); }
    .top    { transform: rotateX(90deg) translateZ(75px); }
    .bottom { transform: rotateX(-90deg) translateZ(75px); }

    button {
        margin-top: 30px;
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 8px;
        background: #00aaff;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #0088cc;
    }
</style>
</head>
<body>

<div class="dice" id="dice">
    <div class="face front">1</div>
    <div class="face back">6</div>
    <div class="face right">3</div>
    <div class="face left">4</div>
    <div class="face top">5</div>
    <div class="face bottom">2</div>
</div>

<button onclick="rollDice()">Würfeln</button>

<script>
function rollDice() {
    const dice = document.getElementById("dice");
    const x = Math.floor(Math.random() * 360);
    const y = Math.floor(Math.random() * 360);
    dice.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
}
</script>

</body>
</html>
